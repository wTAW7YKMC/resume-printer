<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Becky's Resume</title>
    <link rel="stylesheet" href="css/style.css?v=20250410">
    <!-- 异步加载Google Fonts，避免阻塞页面渲染 -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap"></noscript>
    <script>
        // 立即执行，检查URL参数，如果没有showSplash=false，则跳转到开屏页面
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const skipSplash = urlParams.get('showSplash') === 'false';
            
            // 如果没有跳过开屏的参数，则跳转到开屏页面
            if (!skipSplash) {
                console.log('正在跳转到开屏页面...');
                setTimeout(function() {
                    console.log('执行跳转...');
                    window.location.href = 'splash.html';
                }, 100);
            } else {
                console.log('跳过开屏页面，直接显示主页');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <!-- 打字机机身装饰 -->
        <div class="typewriter-body">
            <div class="typewriter-roller"></div>
        </div>

        <!-- 纸张区域 -->
        <div class="paper-container">
            <!-- 主标题区域 -->
            <header class="header">
                <h1 id="main-title" class="main-title">
                    <span id="title-text"></span><span class="cursor">|</span>
                </h1>
            </header>

            <!-- 导航区域 -->
            <nav id="navigation" class="navigation">
                <button class="nav-btn active" data-section="about">About</button>
                <button class="nav-btn" data-section="experience">Experience</button>
                <button class="nav-btn projects-highlight" data-section="projects">Projects</button>
                <button class="nav-btn" data-section="skills">Skills</button>
                <button class="nav-btn" data-section="contact">Contact</button>
            </nav>

            <!-- 内容区域 -->
            <main id="content-area" class="content-area">
                <div id="content-text"></div>
                
                <!-- 留言功能区域 (集成到Contact部分) -->
                <div id="message-section" class="message-section" style="display: none;">
                    <!-- 留言表单 -->
                    <div class="message-form-container">
                        <form id="message-form" class="message-form">
                            <h3>给我留言</h3>
                            <div class="form-group">
                                <label for="message-name">姓名</label>
                                <input type="text" id="message-name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="message-email">邮箱</label>
                                <input type="email" id="message-email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="message-content">留言内容</label>
                                <textarea id="message-content" name="content" rows="4" required></textarea>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="submit-btn">提交留言</button>
                                <button type="button" id="refresh-messages" class="refresh-btn">刷新留言</button>
                            </div>
                        </form>
                        
                        <!-- 留言状态提示 -->
                        <div id="message-status" class="message-status"></div>
                    </div>
                    
                    <!-- 留言列表 -->
                    <div id="message-list-container">
                        <h3>最新留言</h3>
                        <div id="message-list" class="message-list"></div>
                    </div>
                </div>
            </main>

            <!-- DeepSeek AI助手区域 -->
            <div id="ai-assistant-panel" class="ai-assistant-panel">
                <div class="ai-panel-header">
                    <h3>🤖 DeepSeek AI 助手</h3>
                    <button id="ai-close-btn" class="ai-close-btn">✕</button>
                </div>
                <div id="ai-chat-container" class="ai-chat-container"></div>
                <div class="ai-input-area">
                    <input type="text" id="ai-user-input" placeholder="输入你的问题..." />
                    <button id="ai-send-btn" class="ai-send-btn">发送</button>
                </div>
            </div>

            <!-- 控制区域 -->
            <footer class="controls">
                <div class="control-group">
                    <button id="sound-toggle" class="control-btn">🔊</button>
                    <button id="ai-toggle-btn" class="control-btn ai-toggle-btn">🤖 AI助手</button>
                    <div class="export-buttons">
                        <button id="export-current" class="control-btn">导出当前</button>
                        <div id="export-options-current" class="export-options" style="display: none;">
                            <button data-format="pdf" class="export-option">PDF</button>
                            <button data-format="html" class="export-option">HTML</button>
                            <button data-format="txt" class="export-option">文本</button>
                        </div>
                    </div>
                    <div class="export-buttons">
                        <button id="export-full" class="control-btn">导出完整</button>
                        <div id="export-options-full" class="export-options" style="display: none;">
                            <button data-format="pdf" class="export-option">PDF</button>
                            <button data-format="html" class="export-option">HTML</button>
                            <button data-format="txt" class="export-option">文本</button>
                        </div>
                    </div>
                    <button id="force-refresh" class="control-btn">刷新数据</button>
                </div>
                <div class="control-info">
                    <p>最后更新: <span id="last-updated">未知</span></p>
                </div>
            </footer>
            
            <!-- PDF导出加载指示器 -->
            <div id="pdf-loading-indicator" class="loading-indicator" style="display: none;">
                正在导出PDF，请稍候...
            </div>
        </div>
    </div>

    <!-- PDF 导出所需库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- JavaScript 文件 -->
    <script src="js/typewriter.js?v=20250410"></script>
    <script src="js/dataFetcher.js?v=20250410"></script>
    <script src="js/contentRenderer.js?v=20250410"></script>
    <script src="js/soundManager.js?v=20250410"></script>
    <script src="js/pdfExporter.js?v=20250410"></script>
    <script src="js/enhancedExporter.js?v=20250410"></script>
    <script src="js/touchGestures.js?v=20250410"></script>
    <script src="js/messageManager.js?v=20250410"></script>
    <script src="js/localMessageManager.js?v=20250410"></script>
    <script src="js/deepseek.js?v=20250410"></script>
    <script src="js/main.js?v=20250410"></script>
</body>
</html>
