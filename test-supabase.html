<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Supabase 连接测试</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f0f0f0; }
        .box { background: white; padding: 30px; border-radius: 10px; max-width: 800px; margin: 20px auto; }
        input, button { padding: 12px; margin: 8px; font-size: 16px; width: 90%; }
        button { background: #667eea; color: white; border: none; cursor: pointer; border-radius: 6px; }
        button:hover { background: #5568d3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="box">
    <h2>🔗 Supabase 云数据库连接测试</h2>
    
    <label>Project URL:</label><br>
    <input type="text" id="url" value="https://crqwokrpcwvvsibcukkh.supabase.co" style="width:100%">
    
    <label>anon public key:</label><br>
    <input type="text" id="key" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNycXdva3JwY3d2dnNpYmN1a2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODEyNjAsImV4cCI6MjA5MjE1NzI2MH0.J-SsRlUXHrmfxasPlkFl70IXf-BXs_f5XvaeQEGNe8g" style="width:100%">
    
    <button onclick="test()" style="width:100%">🧪 测试连接</button>
    <button onclick="viewData()" style="width:100%; background:#11998e; margin-top:10px">📊 查看所有数据</button>
    
    <div id="result"></div>
</div>

<script>
// Supabase 客户端类
class SupabaseClient {
    constructor(url, key) {
        this.url = url;
        this.key = key;
        this.baseUrl = url + '/rest/v1';
    }

    async request(endpoint) {
        const r = await fetch(this.baseUrl + endpoint, {
            headers: {
                'apikey': this.key,
                'Authorization': 'Bearer ' + this.key,
                'Content-Type': 'application/json'
            }
        });
        if (!r.ok) {
            const e = await r.json();
            throw new Error(e.message || 'HTTP ' + r.status);
        }
        return await r.json();
    }

    async getPersonalInfo() {
        const d = await this.request('/personal_info?limit=1');
        return d && d.length > 0 ? d[0] : null;
    }

    async getAllData() {
        const [pi, edu, work, proj, skills] = await Promise.all([
            this.request('/personal_info'),
            this.request('/education'),
            this.request('/work_experience'),
            this.request('/projects'),
            this.request('/skills')
        ]);
        return { personalInfo: pi, education: edu, workExperience: work, projects: proj, skills };
    }
}

function show(msg, isSuccess) {
    const el = document.getElementById('result');
    el.textContent = msg;
    el.className = isSuccess ? 'success' : 'error';
}

async function test() {
    const url = document.getElementById('url').value.trim();
    const key = document.getElementById('key').value.trim();

    if (!url || !key) {
        show('❌ 请填写完整信息', false);
        return;
    }

    show('⏳ 正在连接...', false);

    try {
        const db = new SupabaseClient(url, key);
        const data = await db.getPersonalInfo();

        if (data) {
            show('✅ 连接成功！\n\n获取到个人信息:\n' + JSON.stringify(data, null, 2), true);
            
            // 保存到localStorage供其他页面使用
            localStorage.setItem('supabase_url', url);
            localStorage.setItem('supabase_key', key);
            show(result.textContent + '\n\n✅ 配置已自动保存！现在可以访问 admin-cloud.html 了', true);
        } else {
            show('✅ 连接成功！但数据库是空的（需要执行SQL初始化脚本）', true);
        }
    } catch (e) {
        show('❌ 连接失败: ' + e.message + '\n\n可能原因:\n1. URL或Key不正确\n2. 还没有执行 supabase-init.sql 脚本', false);
    }
}

async function viewData() {
    const url = document.getElementById('url').value.trim();
    const key = document.getElementById('key').value.trim();

    if (!url || !key) { show('❌ 请填写完整信息', false); return; }

    show('⏳ 正在加载数据...', false);

    try {
        const db = new SupabaseClient(url, key);
        const data = await db.getAllData();
        
        let output = '✅ 所有数据如下：\n\n';
        output += '=== 个人信息 (' + data.personalInfo.length + '条) ===\n';
        output += JSON.stringify(data.personalInfo, null, 2) + '\n\n';
        
        output += '=== 教育经历 (' + data.education.length + '条) ===\n';
        output += JSON.stringify(data.education, null, 2) + '\n\n';
        
        output += '=== 工作经历 (' + data.workExperience.length + '条) ===\n';
        output += JSON.stringify(data.workExperience, null, 2) + '\n\n';
        
        output === '=== 项目经验 (' + data.projects.length + '条) ===\n';
        output += JSON.stringify(data.projects, null, 2) + '\n\n';
        
        output += '=== 技能列表 (' + data.skills.length + '条) ===\n';
        output += JSON.stringify(data.skills, null, 2);

        show(output, true);
    } catch (e) {
        show('❌ 加载失败: ' + e.message, false);
    }
}
</script>
</body>
</html>
